# agents.reimake.com — the agent terminal dashboard (moved from reimake.com/agents/).
# Serves terminal/web/ and proxies the same status APIs + ttyd terminals.
server {
    server_name agents.reimake.com;

    # Let's Encrypt renewals must stay reachable without auth.
    location ^~ /.well-known/acme-challenge/ { auth_request off; allow all; root /var/www/html; }

    # Cookie-session auth (replaces the basic-auth browser dialog, which re-prompted
    # on every 401 and stormed when polling/reload requests piled up). One login on
    # /login -> signed cookie -> every request (fetch, iframe, ttyd ws) carries it.
    auth_request /__auth;
    error_page 401 = @agents_login;

    location = /__auth {
        internal;
        proxy_pass http://127.0.0.1:3046/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }
    location @agents_login { return 302 /login; }
    location = /login {
        auth_request off;
        proxy_pass http://127.0.0.1:3046/login;
        proxy_set_header Host $host;
    }
    location = /logout {
        auth_request off;
        proxy_pass http://127.0.0.1:3046/logout;
        proxy_set_header Cookie $http_cookie;
    }

    # Status / buffer / page-version APIs
    location /api/terminal-status { proxy_pass http://127.0.0.1:3011/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/tmux-buffer/    { proxy_pass http://127.0.0.1:3045/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location = /api/page-version  { proxy_pass http://127.0.0.1:3014/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location = /api/paste-image  { proxy_pass http://127.0.0.1:3047/; proxy_http_version 1.1; proxy_set_header Host $host; client_max_body_size 25m; }

    location /terminal { proxy_pass http://127.0.0.1:3005; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal2 { proxy_pass http://127.0.0.1:3006; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal3 { proxy_pass http://127.0.0.1:3008; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal4 { proxy_pass http://127.0.0.1:3009; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal5 { proxy_pass http://127.0.0.1:3012; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal6 { proxy_pass http://127.0.0.1:3013; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal7 { proxy_pass http://127.0.0.1:3015; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal8 { proxy_pass http://127.0.0.1:3016; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal9 { proxy_pass http://127.0.0.1:3017; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal10 { proxy_pass http://127.0.0.1:3018; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal11 { proxy_pass http://127.0.0.1:3019; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal12 { proxy_pass http://127.0.0.1:3020; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /terminal-oo { proxy_pass http://127.0.0.1:3021; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }
    location /test-terminal { proxy_pass http://127.0.0.1:3099; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_cache_bypass $http_upgrade; proxy_read_timeout 86400; }

    # Dashboard UI
    location / {
        root /home/ubuntu/pr/terminal/web;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/agents.reimake.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/agents.reimake.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = agents.reimake.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name agents.reimake.com;
    return 404; # managed by Certbot


}