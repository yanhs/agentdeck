<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<base href="/tasks/" />
<title>Task Tracker</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --panel2: #1b2230; --line: #232c3a;
    --txt: #d6deeb; --dim: #8a97aa; --done: #3fb950; --active: #d29922;
    --todo: #5b6675; --blocked: #f85149; --accent: #6aa9ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--txt);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; background: rgba(14,17,22,.9); backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 15px; font-weight: 650; margin: 0; letter-spacing: .2px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--todo); box-shadow: 0 0 0 0 rgba(63,185,80,.5); }
  .dot.ok { background: var(--done); animation: pulse 2.4s ease-out infinite; }
  .dot.bad { background: var(--blocked); }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(63,185,80,.45)} 100%{box-shadow:0 0 0 7px rgba(63,185,80,0)} }
  .upd { margin-left: auto; color: var(--dim); font-size: 12px; font-variant-numeric: tabular-nums; }
  main { max-width: 860px; margin: 0 auto; padding: 22px 16px 60px; display: grid; gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; }
  .card.done { opacity: .72; }
  .card-head { display: flex; align-items: flex-start; gap: 12px; }
  .card-head h2 { font-size: 15px; font-weight: 620; margin: 0 0 4px; }
  .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 11.5px; color: var(--dim); }
  .badge { background: var(--panel2); border: 1px solid var(--line); color: var(--accent);
    padding: 1px 7px; border-radius: 999px; font-weight: 600; }
  .tid { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .count { margin-left: auto; font-variant-numeric: tabular-nums; font-weight: 650;
    color: var(--dim); white-space: nowrap; }
  .bar { height: 5px; border-radius: 999px; background: var(--panel2); overflow: hidden; margin: 12px 0 12px; }
  .bar > span { display: block; height: 100%; background: linear-gradient(90deg, #2ea043, var(--done));
    border-radius: 999px; transition: width .5s cubic-bezier(.22,1,.36,1); }
  ul.items { list-style: none; margin: 0; padding: 0; display: grid; gap: 2px; }
  li.it { display: flex; align-items: baseline; gap: 10px; padding: 5px 6px; border-radius: 7px; }
  li.it .ic { width: 16px; text-align: center; font-weight: 700; flex: none; }
  li.it.done .ic { color: var(--done); } li.it.done .t { color: var(--dim); text-decoration: line-through; text-decoration-color: var(--line); }
  li.it.active { background: rgba(210,153,34,.08); }
  li.it.active .ic { color: var(--active); animation: blink 1.4s steps(2,start) infinite; }
  li.it.todo .ic { color: var(--todo); } li.it.todo .t { color: var(--dim); }
  li.it.blocked .ic { color: var(--blocked); } li.it.blocked .t { color: var(--blocked); }
  @keyframes blink { 50% { opacity: .35; } }
  li.it .t { flex: 1; }
  li.it .note { color: var(--dim); font-size: 12px; font-style: italic; }
  .empty { color: var(--dim); text-align: center; padding: 40px; }
  .act { padding: 1px 9px; border-radius: 999px; font-weight: 600; font-size: 11.5px; white-space: nowrap; }
  .act.working { color: var(--done); background: rgba(63,185,80,.13); animation: actpulse 2.2s ease-in-out infinite; }
  .act.stopped { color: var(--active); background: rgba(210,153,34,.15); }
  .act.blocked { color: var(--blocked); background: rgba(248,81,73,.15); }
  @keyframes actpulse { 50% { opacity: .5; } }
  .sort { display: flex; gap: 4px; margin-left: 14px; }
  .sort button { font-family: inherit; font-size: 11px; color: var(--dim); background: var(--panel2);
    border: 1px solid var(--line); padding: 2px 9px; border-radius: 999px; cursor: pointer; }
  .sort button:hover { color: var(--txt); }
  .sort button.on { color: var(--accent); border-color: var(--accent); }
  footer { text-align: center; color: var(--todo); font-size: 11.5px; padding: 0 0 30px; }
</style>
</head>
<body>
  <header>
    <span id="dot" class="dot"></span>
    <h1>Task Tracker</h1>
    <div class="sort" id="sort">
      <button data-s="status" title="Unfinished tasks first">Active first</button>
      <button data-s="newest" title="Newest added first">Newest</button>
    </div>
    <span id="upd" class="upd"></span>
  </header>
  <main id="tasks"></main>
  <footer>live via SSE · shared across all agents</footer>

<script>
const tasksEl = document.getElementById('tasks');
const dot = document.getElementById('dot');
const updEl = document.getElementById('upd');
const ICON = { done: '✓', active: '▸', todo: '○', blocked: '✕' };
let last = null;
let sortMode = localStorage.getItem('tt-sort') || 'status';

function tkey(t){ return t.created || t.updated || ''; }
function sortTasks(tasks){
  const a = tasks.slice();
  if(sortMode === 'newest'){
    a.sort((x,y) => tkey(y).localeCompare(tkey(x)));            // newest added first
  } else {
    const done = t => (t.status === 'done' ? 1 : 0);
    a.sort((x,y) => done(x) - done(y) || tkey(y).localeCompare(tkey(x))); // unfinished first
  }
  return a;
}
function syncSortUI(){
  document.querySelectorAll('#sort button').forEach(b => b.classList.toggle('on', b.dataset.s === sortMode));
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function rel(iso){
  if(!iso) return '';
  const t = new Date(iso).getTime(); if(isNaN(t)) return '';
  const s = Math.max(0,(Date.now()-t)/1000);
  if(s<60) return Math.floor(s)+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function setConn(ok){ dot.className = 'dot ' + (ok?'ok':'bad'); dot.title = ok?'live':'reconnecting…'; }

function render(state){
  last = state;
  updEl.textContent = state && state.updated ? 'updated ' + rel(state.updated) : '';
  const tasks = sortTasks((state && state.tasks) || []);
  if(!tasks.length){ tasksEl.innerHTML = '<p class="empty">No tasks yet.</p>'; return; }
  tasksEl.innerHTML = tasks.map(t => {
    const items = t.items || [];
    const done = items.filter(i => i.status === 'done').length;
    const pct = items.length ? Math.round(done/items.length*100) : 0;
    const rows = items.map(it => `
      <li class="it ${esc(it.status)}">
        <span class="ic">${ICON[it.status] || '○'}</span>
        <span class="t">${esc(it.title)}</span>
        ${it.note ? `<span class="note">${esc(it.note)}</span>` : ''}
      </li>`).join('');
    const ACT = { working: '● working', stopped: '⏸ stopped', blocked: '⛔ blocked' };
    // A finished task never shows an activity badge (it's done, not "working").
    const act = (t.status !== 'done' && t.activity && ACT[t.activity])
      ? `<span class="act ${esc(t.activity)}">${ACT[t.activity]}${t.activity_note ? ' · ' + esc(t.activity_note) : ''}</span>`
      : '';
    return `
      <section class="card ${esc(t.status||'')}">
        <div class="card-head">
          <div>
            <h2>${esc(t.title || t.id)}</h2>
            <div class="meta">
              <span class="badge">${esc(t.agent || '—')}</span>
              ${act}
              <span class="tid">${esc(t.id)}</span>
              <span>${rel(t.updated)}</span>
            </div>
          </div>
          <div class="count">${done}/${items.length}</div>
        </div>
        <div class="bar"><span style="width:${pct}%"></span></div>
        <ul class="items">${rows}</ul>
      </section>`;
  }).join('');
}

// Cache-bust the poll so a CDN (Cloudflare) can never serve a stale state.json.
function load(){ fetch('state.json?t=' + Date.now(), {cache:'no-store'}).then(r=>r.json()).then(render).catch(()=>{}); }

function connect(){
  let es;
  try { es = new EventSource('events'); } catch(_) { return; }
  es.onopen = () => setConn(true);
  es.onmessage = e => { try { render(JSON.parse(e.data)); setConn(true); } catch(_){} };
  es.onerror = () => { setConn(false); load(); }; // EventSource auto-reconnects; refetch now so we don't wait
}

document.getElementById('sort').addEventListener('click', e => {
  const b = e.target.closest('button'); if(!b) return;
  sortMode = b.dataset.s; localStorage.setItem('tt-sort', sortMode);
  syncSortUI(); if(last) render(last);
});
syncSortUI();

load();
connect();
setInterval(load, 3000);                              // baseline refresh (robust even if SSE is buffered by a CDN)
setInterval(() => { if(last) render(last); }, 30000); // refresh relative times
</script>
</body>
</html>
