# AgentDeck local reverse proxy (no auth / no TLS) — for `docker compose up` on your
# machine. For remote access with a login gate + HTTPS, use nginx/agents-subdomain.conf.
server {
    listen 80 default_server;
    server_name _;
    root /app/web;
    index index.html;
    client_max_body_size 25m;

    location / { try_files $uri $uri/ /index.html; }

    # backend APIs — status_server.py serves all of these in one process
    location /api/terminal-status { proxy_pass http://127.0.0.1:3011/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/tmux-buffer/    { proxy_pass http://127.0.0.1:3045/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location = /api/page-version  { proxy_pass http://127.0.0.1:3014/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location = /api/paste-image   { proxy_pass http://127.0.0.1:3047/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location = /login  { proxy_pass http://127.0.0.1:3046/login;  proxy_set_header Host $host; }
    location = /logout { proxy_pass http://127.0.0.1:3046/logout; proxy_set_header Host $host; }

    # one ttyd web terminal per agent (WebSocket upgrade)
    location /terminal  { proxy_pass http://127.0.0.1:3005; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
    location /terminal2 { proxy_pass http://127.0.0.1:3006; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
    location /terminal3 { proxy_pass http://127.0.0.1:3008; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
    location /terminal4 { proxy_pass http://127.0.0.1:3009; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
    location /terminal5 { proxy_pass http://127.0.0.1:3012; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
    location /terminal6 { proxy_pass http://127.0.0.1:3013; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
    location /terminal7 { proxy_pass http://127.0.0.1:3015; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
    location /terminal8 { proxy_pass http://127.0.0.1:3016; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
}
